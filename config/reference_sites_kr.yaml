# KR entries under `sources` are metadata/reference-source descriptors for
# KIS preview guidance. They are not web-fetchable by WebContentService unless
# URL-based entries are added under a separate `sites` list. GPTMarketService
# reference cache fetching only consumes `sites` entries with valid URLs.
market: KR
currency: KRW
timezone: Asia/Seoul
sources:
  - name: "KIS Domestic Stock API"
    type: "broker_api"
    purpose: "current_price_daily_bars_account_data"
    enabled: true

  - name: "KRX Listed Stock Information"
    type: "official_market_data"
    purpose: "listed_stock_master"
    enabled: true

  - name: "OpenDART"
    type: "official_disclosure"
    purpose: "company_disclosure_financials"
    enabled: true

  - name: "KIND"
    type: "official_exchange_disclosure"
    purpose: "trading_halt_listing_disclosure"
    enabled: true
